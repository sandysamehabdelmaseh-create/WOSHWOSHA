<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الأدمن - WOSHWOSHA</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    
    <!-- ربط Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyBj3DEd54luuhyi5a9WVm0XOAtAcbcM6lk",
            authDomain: "woshwosha.firebaseapp.com",
            projectId: "woshwosha",
            storageBucket: "woshwosha.firebasestorage.app",
            messagingSenderId: "11834362704",
            appId: "1:11834362704:web:6d7e2c6dd7b9b08f1bba55",
            measurementId: "G-L3WCD8K24F"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.db = db;
        window.collection = collection;
        window.addDoc = addDoc;
        window.getDocs = getDocs;
        window.deleteDoc = deleteDoc;
        window.doc = doc;
    </script>

    <style>
        :root { --primary-burgundy: #4a0d21; --accent-gold: #d4af37; --soft-pink-bg: #fdf2f5; --text-dark: #2d2226; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--soft-pink-bg); color: var(--text-dark); }
        .top-bar { background: linear-gradient(90deg, #380818 0%, #5c112a 50%, #380818 100%); color: var(--accent-gold); font-size: 0.85rem; padding: 10px 0; font-weight: 600; text-align: center; }
        .main-navbar { background-color: rgba(255, 255, 255, 0.95); backdrop-filter: blur(12px); border-bottom: 1px solid #f3dce3; padding: 12px 0; }
        .brand-logo { font-family: 'Poppins', sans-serif; font-size: 1.7rem; font-weight: 700; color: var(--primary-burgundy); text-decoration: none; }
        .admin-card { background: #ffffff; border: 1px solid #fce3eb; border-radius: 20px; box-shadow: 0 4px 15px rgba(74, 13, 33, 0.05); padding: 25px; margin-bottom: 25px; }
        .btn-burgundy { background-color: var(--primary-burgundy); color: #fff; font-weight: 700; border-radius: 12px; border: none; padding: 10px 20px; transition: all 0.3s; }
        .btn-burgundy:hover { background-color: #380818; color: var(--accent-gold); }
        .table-custom th { background-color: #fff0f4; color: var(--primary-burgundy); border-top: none; }
    </style>
</head>
<body>
    <div class="top-bar">✨ لوحة تحكم الأدمن - متجر WOSHWOSHA ✨</div>
    <nav class="main-navbar sticky-top">
        <div class="container d-flex align-items-center justify-content-between">
            <a href="../index.html" class="btn btn-outline-danger btn-sm rounded-pill fw-bold"><i class="fa-solid fa-arrow-right me-1"></i> الرئيسية</a>
            <a href="../index.html" class="brand-logo">WOSHWOSHA - Admin</a>
            <button class="btn btn-outline-secondary btn-sm rounded-pill fw-bold" onclick="logoutAdmin()" id="logoutBtn" style="display:none;"><i class="fa-solid fa-right-from-bracket me-1"></i> قفل اللوحة</button>
        </div>
    </nav>

    <!-- شاشة تسجيل الدخول الثابتة (تظهر دائماً عند فتح الصفحة) -->
    <div class="container my-5" id="loginSection">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="admin-card text-center">
                    <h3 class="fw-bold mb-4" style="color: var(--primary-burgundy);"><i class="fa-solid fa-lock me-2"></i>تسجيل دخول الأدمن</h3>
                    <p class="text-muted small mb-4">الرجاء إدخال كلمة المرور للوصول إلى لوحة التحكم وإدارة المنتجات.</p>
                    <form onsubmit="handleLogin(event)">
                        <div class="mb-3 text-start">
                            <label class="form-label fw-bold">كلمة المرور</label>
                            <input type="password" id="adminPassword" class="form-control rounded-3 py-2 text-center" required placeholder="أدخل كلمة المرور">
                        </div>
                        <button type="submit" class="btn btn-burgundy w-100 py-2.5 rounded-3">دخول لوحة التحكم 🚀</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- لوحة التحكم الرئيسية (مخفية تماماً حتى يتم إدخال الباسورد الصحيح) -->
    <div class="container my-4" id="adminDashboard" style="display: none;">
        <div class="row">
            <div class="col-12">
                <div class="admin-card">
                    <h4 class="fw-bold mb-4" style="color: var(--primary-burgundy);"><i class="fa-solid fa-plus-circle me-2"></i>إضافة منتج جديد</h4>
                    <form onsubmit="addNewProduct(event)">
                        <div class="row g-3">
                            <div class="col-md-6 text-start">
                                <label class="form-label fw-bold">اسم المنتج <span class="text-danger">*</span></label>
                                <input type="text" id="pName" class="form-control rounded-3" required placeholder="مثال: برفان فخامة ليدي">
                            </div>
                            <div class="col-md-6 text-start">
                                <label class="form-label fw-bold">السعر (ج.م) <span class="text-danger">*</span></label>
                                <input type="number" id="pPrice" class="form-control rounded-3" required placeholder="مثال: 250">
                            </div>
                            <div class="col-md-6 text-start">
                                <label class="form-label fw-bold">القسم <span class="text-danger">*</span></label>
                                <select id="pCategory" class="form-select rounded-3" required>
                                    <option value="" disabled selected>اختر القسم المناسب</option>
                                    <option value="nails">نايلز (Nails)</option>
                                    <option value="mackup">مكياج (Makeup)</option>
                                    <option value="per">برفانات (Perfumes)</option>
                                    <option value="hair">فرش الشعر (Hair Brushes)</option>
                                    <option value="cairhair">عناية بالشعر (Hair Care)</option>
                                    <option value="cairboudy">عناية بالجسم (Body Care)</option>
                                    <option value="cream">كريمات وعناية بالبشرة (Skin Care & Creams)</option>
                                    <option value="kids">قسم الأطفال (Kids Section)</option>
                                    <option value="peaper">قسم الورقيات (Paper Products)</option>
                                </select>
                            </div>
                            <div class="col-md-6 text-start">
                                <label class="form-label fw-bold">رابط الصورة الرئيسية <span class="text-danger">*</span></label>
                                <input type="url" id="pImage" class="form-control rounded-3" required placeholder="https://example.com/image.jpg">
                            </div>
                            <div class="col-12 text-start">
                                <label class="form-label fw-bold">وصف المنتج التفصيلي</label>
                                <textarea id="pDesc" class="form-control rounded-3" rows="3" placeholder="اكتب وصفاً جذاباً للمنتج..."></textarea>
                            </div>
                            <div class="col-12">
                                <button type="submit" class="btn btn-burgundy w-100 py-3"><i class="fa-solid fa-check me-1"></i> حفظ وإضافة المنتج للمتجر</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>

            <!-- قائمة المنتجات الحالية -->
            <div class="col-12">
                <div class="admin-card">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h4 class="fw-bold m-0" style="color: var(--primary-burgundy);"><i class="fa-solid fa-box-open me-2"></i>إدارة المنتجات الحالية</h4>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-custom align-middle text-center">
                            <thead>
                                <tr>
                                    <th>الصورة</th>
                                    <th>اسم المنتج</th>
                                    <th>القسم</th>
                                    <th>السعر</th>
                                    <th>الإجراءات</th>
                                </tr>
                            </thead>
                            <tbody id="adminProductsTable"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // إبقاء صفحة الباسورد ثابتة وإجبارية عند كل فتح للصفحة
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('adminDashboard').style.display = 'none';
            document.getElementById('logoutBtn').style.display = 'none';
        });

        // التحقق من كلمة المرور (sameh851974)
        function handleLogin(e) {
            e.preventDefault();
            const pass = document.getElementById('adminPassword').value;
            if (pass === 'sameh851974') {
                // إخفاء شاشة الباسورد وإظهار لوحة التحكم
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('adminDashboard').style.display = 'block';
                document.getElementById('logoutBtn').style.display = 'inline-block';
                renderAdminProducts();
            } else {
                alert('كلمة المرور غير صحيحة! يرجى المحاولة مرة أخرى.');
            }
        }

        // زر قفل اللوحة وإعادة إظهار صفحة الباسورد
        function logoutAdmin() {
            document.getElementById('adminDashboard').style.display = 'none';
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('logoutBtn').style.display = 'none';
            document.getElementById('adminPassword').value = ''; // تفريغ حقل الباسورد
        }

        // إضافة منتج جديد إلى Firebase Firestore
        async function addNewProduct(e) {
            e.preventDefault();
            const name = document.getElementById('pName').value;
            const price = parseFloat(document.getElementById('pPrice').value);
            const category = document.getElementById('pCategory').value;
            const image = document.getElementById('pImage').value;
            const description = document.getElementById('pDesc').value;

            try {
                await window.addDoc(window.collection(window.db, "products"), {
                    name: name,
                    price: price,
                    category: category,
                    images: [image],
                    description: description || "لا توجد تفاصيل إضافية.",
                    createdAt: new Date()
                });
                
                alert('تمت إضافة المنتج بنجاح وظهر للجميع في المتجر! ✨');
                e.target.reset();
                renderAdminProducts();
            } catch (error) {
                console.error("خطأ أثناء الإضافة: ", error);
                alert('حدث خطأ، يرجى المحاولة مرة أخرى.');
            }
        }

        // جلب وعرض المنتجات
        async function renderAdminProducts() {
            const tbody = document.getElementById('adminProductsTable');
            tbody.innerHTML = `<tr><td colspan="5" class="text-muted py-4">جاري تحميل المنتجات...</td></tr>`;

            try {
                const querySnapshot = await window.getDocs(window.collection(window.db, "products"));
                const products = [];
                querySnapshot.forEach((doc) => {
                    products.push({ id: doc.id, ...doc.data() });
                });

                if (products.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="5" class="text-muted py-4">لا توجد منتجات مضافة حالياً.</td></tr>`;
                    return;
                }

                tbody.innerHTML = products.map(p => `
                    <tr>
                        <td><img src="${p.images && p.images[0] ? p.images[0] : 'https://via.placeholder.com/50'}" style="width: 45px; height: 45px; object-fit: cover; border-radius: 8px;"></td>
                        <td class="fw-bold">${p.name}</td>
                        <td><span class="badge bg-light text-dark border">${p.category}</span></td>
                        <td class="text-danger fw-bold">${p.price} ج.م</td>
                        <td>
                            <button class="btn btn-outline-danger btn-sm rounded-circle" onclick="deleteProduct('${p.id}')" title="حذف">
                                <i class="fa-solid fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error("خطأ في جلب المنتجات: ", error);
                tbody.innerHTML = `<tr><td colspan="5" class="text-danger py-4">فشل تحميل المنتجات من القاعدة.</td></tr>`;
            }
        }

        // حذف منتج
        async function deleteProduct(id) {
            if (confirm('هل أنت متأكد من حذف هذا المنتج نهائياً من المتجر؟')) {
                try {
                    await window.deleteDoc(window.doc(window.db, "products", id));
                    alert('تم حذف المنتج بنجاح!');
                    renderAdminProducts();
                } catch (error) {
                    console.error("خطأ أثناء الحذف: ", error);
                    alert('فشل الحذف، حاول مرة أخرى.');
                }
            }
        }
    </script>
</body>
</html>
